<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - PioneersX</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='80' font-family='Arial Black,sans-serif' font-size='90' font-weight='900' text-anchor='middle' fill='%23ff1e1e'%3EX%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">Pioneers<span class="x">X</span></div>
                    <p class="auth-tagline">AI-Powered Solutions Platform</p>
                </div>
                
                <div class="auth-title">
                    <h1>Reset Password</h1>
                    <p>Enter your new password below</p>
                </div>
                
                <div class="alert" id="alert"></div>
                
                <form id="resetForm">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="8">
                            <span class="input-icon" onclick="togglePassword('password')">
                                <i class="fas fa-eye" id="eyeIcon1"></i>
                            </span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required minlength="8">
                            <span class="input-icon" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye" id="eyeIcon2"></i>
                            </span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Reset Password</button>
                </form>
                
                <div class="auth-footer">
                    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to sign in</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        // If no token, show error
        if (!token) {
            showAlert('Invalid or missing reset token', 'error');
            document.getElementById('resetForm').style.display = 'none';
        }
        
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
        }
        
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = fieldId === 'password' ? document.getElementById('eyeIcon1') : document.getElementById('eyeIcon2');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            // Validate password length
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters', 'error');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Resetting...';
            
            try {
                const result = await API.resetPassword(token, password);
                
                if (result.success) {
                    showAlert('Password reset successful! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    showAlert(result.message || 'Failed to reset password. Link may be expired.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Reset Password';
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Reset Password';
            }
        });
    </script>
</body>
</html>
