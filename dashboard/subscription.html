<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription - PioneersX</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='80' font-family='Arial Black,sans-serif' font-size='90' font-weight='900' text-anchor='middle' fill='%23ff1e1e'%3EX%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    
    <!-- Logout Modal -->
    <div class="modal-overlay" id="logoutModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h2 class="modal-title">Logout</h2>
            <p class="modal-text">Are you sure you want to logout from your account?</p>
            <div class="modal-actions">
                <button class="btn btn-secondary btn-block" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary btn-block" onclick="confirmLogout()">Logout</button>
            </div>
        </div>
    </div>
    
    <!-- Notification Dropdown -->
    <div class="notification-dropdown" id="notificationDropdown">
        <div class="notification-header">Notifications</div>
        <div class="notification-body">
            <div class="notification-empty">
                <i class="fas fa-bell-slash"></i>
                <p>No new notifications</p>
            </div>
        </div>
    </div>
    
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <span class="brand-text">Pioneers<span class="x">X</span></span>
                </div>
                <button class="sidebar-close" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-group">
                    <div class="nav-group-title">Menu</div>
                    <a href="dashboard.html" class="nav-item">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="subscription.html" class="nav-item active">
                        <i class="fas fa-crown"></i>
                        <span>Subscription</span>
                        <span class="nav-badge">PRO</span>
                    </a>
                </div>
                
                <div class="nav-group">
                    <div class="nav-group-title">Products</div>
                    <a href="../assistx/index.html" class="nav-item" target="_blank">
                        <i class="fas fa-robot"></i>
                        <span>AssistX</span>
                    </a>
                    <a href="../analyticsx/index.html" class="nav-item" target="_blank">
                        <i class="fas fa-chart-line"></i>
                        <span>AnalyticsX</span>
                    </a>
                </div>
                
                <div class="nav-group">
                    <div class="nav-group-title">Account</div>
                    <a href="profile.html" class="nav-item">
                        <i class="fas fa-user"></i>
                        <span>Profile</span>
                    </a>
                    <a href="settings.html" class="nav-item">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                    <a href="../index.html" class="nav-item" target="_blank">
                        <i class="fas fa-external-link-alt"></i>
                        <span>Main Website</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-menu" onclick="showLogoutModal()">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">User</div>
                        <div class="user-email" id="userEmail">user@email.com</div>
                    </div>
                    <i class="fas fa-sign-out-alt user-menu-icon"></i>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="openSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Subscription</h1>
                </div>
                <div class="header-right">
                    <button class="header-btn" onclick="toggleNotifications()" title="Notifications">
                        <i class="fas fa-bell"></i>
                    </button>
                    <a href="mailto:support@pioneersx.store" class="header-btn" title="Help & Support">
                        <i class="fas fa-question-circle"></i>
                    </a>
                </div>
            </header>
            
            <div class="content">
                <!-- Your subscription page content here -->
                <h1>Subscription Plans</h1>
                <p>Choose the plan that's right for you.</p>
            </div>
        </main>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        // Auth check
        if (!API.isLoggedIn()) {
            window.location.href = 'index.html';
        }
        
        // Load user data
        function loadUserData() {
            const userStr = localStorage.getItem('user');
            if (!userStr) return;
            
            const user = JSON.parse(userStr);
            const firstName = user.firstName || 'User';
            const lastName = user.lastName || '';
            const capitalizedFirst = firstName.charAt(0).toUpperCase() + firstName.slice(1);
            const capitalizedLast = lastName ? lastName.charAt(0).toUpperCase() + lastName.slice(1) : '';
            const fullName = `${capitalizedFirst} ${capitalizedLast}`.trim();
            
            document.getElementById('userName').textContent = fullName;
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('userAvatar').textContent = capitalizedFirst.charAt(0);
        }
        
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }
        
        function showLogoutModal() {
            document.getElementById('logoutModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('logoutModal').classList.remove('show');
        }
        
        function confirmLogout() {
            API.logout();
            window.location.href = 'index.html';
        }
        
        function toggleNotifications() {
            const dropdown = document.getElementById('notificationDropdown');
            dropdown.classList.toggle('show');
            
            if (dropdown.classList.contains('show')) {
                setTimeout(() => {
                    document.addEventListener('click', closeNotificationsOutside);
                }, 100);
            }
        }
        
        function closeNotificationsOutside(e) {
            const dropdown = document.getElementById('notificationDropdown');
            if (!dropdown.contains(e.target) && !e.target.closest('.header-btn')) {
                dropdown.classList.remove('show');
                document.removeEventListener('click', closeNotificationsOutside);
            }
        }
        
        // Load data
        loadUserData();
    </script>
</body>
</html>
